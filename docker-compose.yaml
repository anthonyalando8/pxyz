version: '3.9'

services:
  # 🔹 Traefik - the single entrypoint
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"   # ⚠️ remove in production
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"      # All traffic goes here
      - "8080:8080"  # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - micro_net

  # 🔹 Redis
  redis:
    image: redis:7
    container_name: redis
    networks:
      - micro_net

  # 🔹 Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: auth-service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user-auth.rule=PathPrefix(`/auth`)"
      - "traefik.http.services.user-auth.loadbalancer.server.port=8001"
    env_file:
      - ./services/auth-service/.env
    volumes:
      - ./services/auth-service/secrets:/app/secrets:ro
      - ./uploads:/app/uploads
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 2000
      DB_NAME: pxyz
      REDIS_ADDR: redis:6379
      SYSTEM_ADMIN_PASSWORD: 96211581#Aa
      SYSTEM_ADMIN_EMAIL: anthonyalando8@gmail.com
    networks:
      - micro_net
    depends_on:
      - redis
      - core-service
      - session-service
      - email-service
      - otp-service
      - u-access-service

  # 🔹 Session Service
  session-service:
    build:
      context: .
      dockerfile: services/session-mngt/Dockerfile
    container_name: session-service
